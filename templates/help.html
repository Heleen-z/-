<!DOCTYPE html>
<html>
<body>
    <input type="file" id="fileInput">
    <div id="status">等待上传...</div>
    
    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            document.getElementById('status').textContent = 
                '已选择: ' + e.target.files[0].name;
        });
    </script>
</body>
</html>
