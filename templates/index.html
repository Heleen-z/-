<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>金属缺陷检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
               min-height: 100vh; margin: 0; padding: 100px 20px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; }
        .upload-area { border: 3px dashed #3498db; padding: 40px; text-align: center; cursor: pointer; margin: 20px 0; }
        .upload-area:hover { background: #f0f8ff; }
        .result-section { display: none; margin-top: 20px; }
        .loading { display: none; text-align: center; }
        .error { color: red; display: none; }
        .success { color: green; display: none; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>金属表面缺陷检测系统</h1>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p>点击上传图像</p>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </div>
        <div id="loading" class="loading">正在分析...</div>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        <div id="resultSection" class="result-section">
            <h3>检测结果</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script>
        // 极简但健壮的代码
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                console.log('File selected:', file.name);
                uploadFile(file);
            }
        });

        function uploadFile(file) {
            console.log('Uploading:', file.name);
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Response received:', response.status);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(data => {
                console.log('Data:', data);
                document.getElementById('loading').style.display = 'none';
                if (data.error) {
                    document.getElementById('error').textContent = data.error;
                    document.getElementById('error').style.display = 'block';
                } else {
                    document.getElementById('resultText').textContent = 
                        '类别: ' + (data.class || '未知') + 
                        ', 置信度: ' + ((data.confidence || 0) * 100).toFixed(1) + '%';
                    document.getElementById('resultSection').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 
                    '上传失败: ' + error.message;
                document.getElementById('error').style.display = 'block';
            });
        }
    </script>
</body>
</html>
