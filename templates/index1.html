<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金属表面缺陷检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50; --secondary-color: #34495e; --accent-color: #3498db;
            --success-color: #27ae60; --warning-color: #f39c12; --danger-color: #e74c3c;
            --light-bg: #ecf0f1; --dark-bg: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: var(--primary-color);
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 30px auto; padding: 40px; max-width: 1200px;
        }
        .header {
            text-align: center; margin-bottom: 40px; padding-bottom: 30px;
            border-bottom: 3px solid var(--accent-color);
        }
        .header h1 {
            font-size: 2.5rem; font-weight: 700; color: var(--primary-color); margin-bottom: 10px;
        }
        .upload-section {
            background: var(--light-bg); border-radius: 15px; padding: 30px;
            margin-bottom: 30px; text-align: center; border: 2px dashed var(--accent-color);
            transition: all 0.3s ease;
        }
        .upload-section:hover {
            border-color: var(--success-color); background: #f8f9fa;
        }
        .upload-area {
            position: relative; padding: 40px 20px; cursor: pointer;
        }
        .upload-icon { font-size: 4rem; color: var(--accent-color); margin-bottom: 20px; }
        .btn-upload {
            background: var(--accent-color); border: none; color: white;
            padding: 12px 30px; border-radius: 25px; font-size: 1rem; font-weight: 600;
            transition: all 0.3s ease; cursor: pointer;
        }
        .result-section { display: none; margin-top: 30px; }
        .result-card {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); margin-bottom: 20px;
        }
        .confidence-badge {
            background: var(--success-color); color: white; padding: 5px 15px;
            border-radius: 20px; font-size: 0.9rem; font-weight: 600; margin-left: auto;
        }
        .loading { display: none; text-align: center; margin: 30px 0; }
        .error-message, .success-message {
            padding: 15px; border-radius: 10px; margin: 20px 0; display: none;
        }
        .error-message { background: var(--danger-color); color: white; }
        .success-message { background: var(--success-color); color: white; }
        .spinner {
            width: 50px; height: 50px; border: 5px solid var(--light-bg);
            border-top: 5px solid var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container" style="margin-top: 100px;">
        <div class="main-container">
            <div class="header">
                <h1><i class="fas fa-industry"></i> 金属表面缺陷检测系统</h1>
                <p>基于深度学习的工业级缺陷检测解决方案</p>
            </div>

            <div class="upload-section">
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                    <div class="upload-text">点击上传金属表面图像</div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <div id="errorMessage" class="error-message"><span id="errorText"></span></div>
            <div id="successMessage" class="success-message"><span id="successText"></span></div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <h4>正在分析图像...</h4>
            </div>

            <div id="resultSection" class="result-section">
                <div class="result-card">
                    <div class="result-header">
                        <i class="fas fa-search" id="resultIcon"></i>
                        <div class="result-title" id="resultTitle">检测结果</div>
                        <div class="confidence-badge" id="confidenceBadge">置信度</div>
                    </div>
                    <img id="resultImage" class="result-image" src="" alt="结果">
                    <div class="defect-description" id="defectDescription">描述信息</div>
                    <div id="probabilityBars"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 简洁可靠的版本
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) uploadFile(file);
        });

        function uploadFile(file) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    if (data.error) {
                        showError(data.error);
                    } else {
                        displayResult(data);
                    }
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    showError('上传失败: ' + err.message);
                });
        }

        function displayResult(data) {
            document.getElementById('resultTitle').textContent = 
                '检测结果 - ' + (data.class || '未知');
            document.getElementById('confidenceBadge').textContent = 
                ((data.confidence || 0) * 100).toFixed(1) + '%';
            document.getElementById('defectDescription').textContent = 
                data.description || '暂无描述';
            document.getElementById('resultImage').src = 
                data.filename ? '/uploads/' + data.filename : '';
            document.getElementById('resultSection').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</body>
</html>
